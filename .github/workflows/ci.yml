name: iOS CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'Soulo/**'
      - 'project.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Soulo/**'
      - 'project.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Swift Lint
        run: swiftlint --strict

  build:
    needs: lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode Project
        run: xcodegen
      - name: Build
        run: |
          xcodebuild build \
            -project Soulo.xcodeproj \
            -scheme Soulo \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

  test:
    needs: lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode Project
        run: xcodegen
      - name: Run Tests
        run: |
          xcodebuild test \
            -project Soulo.xcodeproj \
            -scheme Soulo \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

  deploy-testflight:
    if: github.ref == 'refs/heads/main'
    needs: [build, test]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode Project
        run: xcodegen
      - name: Archive
        run: |
          xcodebuild archive \
            -project Soulo.xcodeproj \
            -scheme Soulo \
            -configuration Release \
            -archivePath build/Soulo.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.DEV_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="Soulo AppStore" \
            | xcpretty
      - name: Upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Soulo.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ \
            | xcpretty
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Soulo.ipa
          path: build/Soulo.ipa
