name: Soulo
options:
  bundleIdPrefix: com.soulo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Whisper:
    url: https://github.com/ggerganov/whisper.spm
    from: 1.12.0
  ONNXRuntime:
    url: https://github.com/microsoft/onnxruntime-swift
    from: 1.20.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) DEBUG
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      OPTIMIZATION_LEVEL: "-O"

targets:
  Soulo:
    type: application
    platform: iOS
    sources:
      - path: Soulo
        type: group
        createIntermediateGroups: true
      - path: Config
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soulo.app
        INFOPLIST_FILE: Soulo/Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        
        # Privacy permissions
        INFOPLIST_KEY_NSCameraUsageDescription: ""
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Soulo needs microphone access to record your daily journal entries. Recordings are processed on-device and never uploaded."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Soulo transcribes your journal entries to analyze topics and patterns. All transcription happens on your device."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Soulo uses Face ID to protect your private journal entries."
        
        # App category
        INFOPLIST_KEY_UIApplicationSceneManifest: ""
        INFOPLIST_KEY_UILaunchScreenDictionary: ""
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        INFOPLIST_KEY_UIRequiredDeviceCapabilities: [arm64, microphone]
        
        # Family Sharing
        INFOPLIST_KEY_CFBundleDevelopmentRegion: en_US
        INFOPLIST_KEY_FAMILY_SHARING_ENABLED: YES

        # URL Schemes (Stripe callback)
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLName: com.soulo.app
            CFBundleURLSchemes:
              - soulo

        # Launch Screen
        INFOPLIST_KEY_UILaunchScreen:
          UIImageName: ""
          UIColorName: ""
          UIImageRespectsSafeAreaInsets: true

        # iCloud
        INFOPLIST_KEY_UBIQUITY_CONTAINER_IDENTIFIER: iCloud.com.soulo.app
        INFOPLIST_KEY_UBIQUITY_KEY_VALUE_STORE_IDENTIFIER: iCloud.com.soulo.app

    dependencies:
      - sdk: CryptoKit.framework
      - sdk: NaturalLanguage.framework
      - sdk: SwiftUI.framework
      - sdk: StoreKit.framework
      - sdk: OSLog.framework
      - sdk: UserNotifications.framework
      - package: Whisper
      - package: ONNXRuntime

    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint >/dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed"
          fi
        basedOnDependencyAnalysis: false

    postCompileScripts:
      - name: SwiftLint autocorrect
        script: |
          if which swiftlint >/dev/null; then
            swiftlint --fix
          fi
        basedOnDependencyAnalysis: false

    preBuildScripts:
      - name: Download Models
        script: |
          if [ ! -d "$SRCROOT/Soulo/Resources/Models" ]; then
            echo "Models not found. Run Scripts/download_models.sh"
          fi
        basedOnDependencyAnalysis: false

  SouloUnitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/UnitTests
    dependencies:
      - target: Soulo
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Soulo.app/Soulo"
        PRODUCT_BUNDLE_IDENTIFIER: com.soulo.app.unitTests

  SouloIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/IntegrationTests
    dependencies:
      - target: Soulo
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Soulo.app/Soulo"
        PRODUCT_BUNDLE_IDENTIFIER: com.soulo.app.integrationTests

schemes:
  Soulo:
    build:
      targets:
        Soulo: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SouloUnitTests
        - SouloIntegrationTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
