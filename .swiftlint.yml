disabled_rules:
  - trailing_comma
  - vertical_parameter_alignment
  - large_tuple
  - function_body_length
  - cyclomatic_complexity
  - non_optional_string_data_conversion
  - statement_position
  - redundant_string_enum_value
  - for_where
  - multiple_closures_with_trailing_closure
  - unused_enumerated
  - force_cast
  - nesting
  - file_length
  - type_body_length
  - trailing_newline
  - vertical_whitespace

opt_in_rules: []

line_length:
  warning: 200
  error: 250
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 1
  max_length: 60
  allowed_symbols: ["_"]
  excluded:
    - iv
    - id
    - to
    - in
    - at
    - of
    - on
    - up
    - by
    - as
    - or
    - if
    - re
    - i
    - j
    - k
    - x
    - y
    - z
    - n
    - m
    - a
    - b
    - c
    - d
    - e
    - f
    - g
    - p
    - q
    - r
    - s
    - t
    - u
    - v
    - w

type_name:
  min_length: 1
  max_length: 60

nesting:
  type_level: 3

cyclomatic_complexity:
  warning: 30
  error: 40

trailing_whitespace:
  ignores_empty_lines: true

file_length:
  warning: 800
  error: 1200

function_body_length:
  warning: 100
  error: 150

type_body_length:
  warning: 400
  error: 600
